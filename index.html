<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>CBT ANBK</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login" id="loginBox">
 <h1>CBT ANBK 2026</h1>
 <input type="text" id="nama"
 placeholder="Masukkan nama peserta">
 <button onclick="login()">Mulai Ujian</button>
</div>

<header>
 <div id="user">Peserta</div>
 <div id="timer">60:00</div>
</header>

<div class="container">

 <div class="sidebar">
  <h2>Daftar Soal</h2>
  <div class="nav-grid" id="nav"></div>
 </div>

 <div class="main">

  <div class="card">

   <h2 id="nomor"></h2>

   <p id="soal"></p>

   <div class="opsi" id="opsi"></div>

   <button class="action"
   onclick="submitUjian()">
    Selesai Ujian
   </button>

  </div>

 </div>

</div>

<script src="app.js"></script>
</body>
</html>
